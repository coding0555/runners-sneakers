<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNNER | Elite Sneakers</title>
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/2742/2742674.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">RUNNER</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="myorders.html">My Orders</a></li>
        </ul>
        <div class="cart-container" onclick="toggleCart()">
            <span id="cart-icon">🛒</span>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <section class="hero">
        <h1>UNLEASH YOUR SPEED</h1>
        <p>Premium footwear for the modern athlete.</p>
        <a href="products.html" class="btn">Shop Now</a>
    </section>

    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <h2>Secure Checkout</h2>
            <p>Select Payment Method:</p>
            <div class="payment-options">
                <button onclick="placeOrder('COD')">Cash on Delivery</button>
                <button onclick="placeOrder('Card')">Credit/Debit Card</button>
                <button onclick="placeOrder('NetBanking')">Net Banking</button>
            </div>
            <button class="close-btn" onclick="closeModal()">Cancel</button>

            <footer class="footer">
                <div class="footer-container">
                    <div class="footer-logo">
                        <h2 style="color: #ff4757;">RUNNER</h2>
                        <p>&copy; 2026 runner.com</p>
                    </div>

                    <div class="footer-contact">
                        <h3>Contact Us</h3>
                        <form id="contactForm">
                            <input type="text" id="userName" placeholder="Your Name" required>
                            <textarea id="userMessage" placeholder="Your Query" required></textarea>
                            <button type="submit" class="whatsapp-btn">
                                Send to WhatsApp <i class="fab fa-whatsapp"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <section class="orders-section">
        <div class="container">
            <h1>Your Order History</h1>
            <p>Track your latest drops and deliveries.</p>

            <div id="order-list">
                <div class="loading">Checking your locker...</div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        // Load the footer component
        loadFooter();
        // Trigger the order display logic
        displayOrders();
    </script>
</body>

</html>

<script src="script.js"></script>
</body>

</html>
